<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>军棋 - Land Battle Chess</title>
<style>
/* ---- reset & base ---- */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #e8e4df; min-height: 100vh; }

/* ---- page layout ---- */
.page { display: flex; justify-content: center; gap: 36px; padding: 28px; min-height: 100vh; align-items: flex-start; }
.board-area { flex-shrink: 0; }
.panel { width: 420px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
.panel-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-areas:
    "status move"
    "score  score"
    "battle battle";
  gap: 12px;
}
.panel-grid > #status-card    { grid-area: status; }
.panel-grid > #move-card      { grid-area: move; }
.panel-grid > #scoreboard-card{ grid-area: score; }
.panel-grid > #battle-card    { grid-area: battle; }
.panel-grid > .card { padding: 12px 14px; }
.panel-grid > .card h3 { margin-bottom: 8px; padding-bottom: 6px; font-size: 15px; }

/* ---- board ---- */
.board-wrapper {
  background: linear-gradient(180deg, #648943 0%, #557836 100%);
  border-radius: 10px;
  padding: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,.22);
  position: relative;
}
.board-title { text-align: center; color: #f0eccf; font-size: 18px; letter-spacing: 4px; margin-bottom: 10px; font-weight: 800; text-shadow: 0 1px 0 rgba(0,0,0,.15); }
#board-svg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
table { border-collapse: separate; border-spacing: 6px; margin: 0 auto; position: relative; z-index: 1; }

/* ---- floating piece for animation ---- */
.ghost-piece {
  position: absolute; z-index: 10; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 800; color: #fff;
  text-shadow: none;
  border-radius: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,.35);
}
.ghost-piece.side-A { background: #e8943a; border: 2px solid #b06818; }
.ghost-piece.side-B { background: #3a8ad0; border: 2px solid #1a5a90; }

/* river */
.river td { height: 22px; background: #4a8ac0; border: none; border-radius: 0; cursor: default; position: relative; }
.river td::after { content: "~ ~ ~"; color: #90d0f0; font-size: 12px; letter-spacing: 2px; }

/* ---- cells ---- */
td {
  width: 72px; height: 48px;
  text-align: center; vertical-align: middle;
  font-size: 20px; font-weight: 800;
  cursor: pointer; user-select: none;
  border: 1px solid #3a5a2a;
  border-radius: 4px;
  position: relative;
  transition: background 0.12s, box-shadow 0.12s;
  background: #c4b998;
  color: #333;
}
td.camp { border-radius: 50%; background: #b8cfa0; border: 2px dashed #6a8a4a; }
td.hq { background: #a08060; border: 3px double #5a3a1a; border-radius: 6px; }
td.empty { color: transparent; }
td.camp.empty { background: #c8d8b4; }
td.hq.empty { background: #b89878; }

td.side-A { background: #e8943a; color: #fff; text-shadow: none; border-color: #b06818; }
td.side-B { background: #3a8ad0; color: #fff; text-shadow: none; border-color: #1a5a90; }

/* ---- interaction states ---- */
td.selected { box-shadow: 0 0 0 3px #ff2020, inset 0 0 6px rgba(255,0,0,.15); z-index: 2; }
td.highlight { background: #70d870 !important; color: #1a3a1a !important; text-shadow: none !important; border-color: #40a040 !important; box-shadow: inset 0 0 8px rgba(64,160,64,.3); }
td.move-from { box-shadow: 0 0 0 3px #e04040; z-index: 2; }
td.move-to   { box-shadow: 0 0 0 3px #e04040; z-index: 2; }
td.ai-from   { box-shadow: 0 0 0 3px #e88020; z-index: 2; }
td.ai-to     { box-shadow: 0 0 0 3px #e88020; z-index: 2; }
td.trace-point {
  outline: 2px dashed #d32f2f;
  outline-offset: -3px;
  animation: trace-flash 0.9s infinite;
}
@keyframes trace-flash {
  0%, 100% { box-shadow: 0 0 0 0 rgba(211,47,47,0.05); }
  50% { box-shadow: 0 0 0 2px rgba(211,47,47,0.45); }
}
.move-cursor {
  position: absolute;
  z-index: 4;
  min-width: 18px;
  height: 12px;
  line-height: 12px;
  font-size: 8px;
  font-weight: 800;
  text-align: center;
  border-radius: 8px;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.75);
  pointer-events: none;
  box-shadow: 0 1px 2px rgba(0,0,0,0.35);
}
.cursor-player-from { top: 2px; left: 2px; background: #2d7ff9; }
.cursor-player-to { top: 2px; right: 2px; background: #1b4f9a; }
.cursor-ai-from { bottom: 2px; left: 2px; background: #f29a2e; color: #fff; }
.cursor-ai-to { bottom: 2px; right: 2px; background: #c76a1d; }

/* capture flash */
@keyframes capture-flash {
  0%   { box-shadow: 0 0 0 0 rgba(255,60,60,.7); }
  50%  { box-shadow: 0 0 16px 6px rgba(255,60,60,.5); }
  100% { box-shadow: 0 0 0 0 rgba(255,60,60,0); }
}
td.capture-effect { animation: capture-flash 0.4s ease-out; }

/* ---- SVG path highlight ---- */
.svg-path-hl { stroke: #f0e060; stroke-width: 5; stroke-linecap: round; opacity: 0.5; }
.svg-trace-player {
  stroke: #2d7ff9;
  stroke-width: 6;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  opacity: 0.95;
}
.svg-trace-ai {
  stroke: #f29a2e;
  stroke-width: 6;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  opacity: 0.95;
}

/* ---- right panel ---- */
.card {
  background: linear-gradient(180deg, #ffffff 0%, #fcfcfc 100%);
  border-radius: 10px;
  padding: 16px;
  border: 1px solid #ececec;
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
}
.card h3 { font-size: 16px; color: #6d6d6d; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 7px; letter-spacing: .5px; }
.status-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 14px; }
.status-label { color: #888; }
.status-value { font-weight: 800; color: #2d2d2d; }
.turn-indicator { font-size: 20px; text-align: center; padding: 6px 0; font-weight: bold; line-height: 1.2; }
.turn-player { color: #2070c0; }
.turn-ai { color: #d07020; }
.turn-thinking { color: #d07020; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.result { text-align: center; font-size: 18px; font-weight: bold; padding: 8px 0; border-radius: 6px; }
.result-win { background: #d4edda; color: #155724; }
.result-lose { background: #f8d7da; color: #721c24; }
.last-move {
  font-size: 14px;
  color: #555;
  line-height: 1.55;
  max-height: 110px;
  overflow-y: auto;
}
.last-move-empty { color: #999; }
.last-move .player-move { color: #2070c0; }
.last-move .ai-move-text { color: #d07020; }
.battle-log {
  max-height: 220px;
  overflow-y: auto;
  font-size: 14px;
  color: #555;
  line-height: 1.55;
}
.battle-log-item {
  padding: 6px 0;
  border-bottom: 1px dashed #eee;
}
.battle-log-latest {
  color: #c62828;
  font-weight: 800;
}
.battle-log-empty { color: #999; }

/* ---- scoreboard ---- */
.score-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.score-col {
  border-radius: 8px;
  padding: 10px 12px;
  border: 1px solid #e6e9ec;
  background: #f6f7f9;
}
.score-col-me { background: linear-gradient(180deg, #eef4fd 0%, #dfeaf9 100%); border-color: #c7daf2; }
.score-col-op { background: linear-gradient(180deg, #fcf1e6 0%, #f6e3cb 100%); border-color: #efceab; }
.score-col-title {
  text-align: center;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 6px;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(0,0,0,.08);
}
.score-col-me .score-col-title { color: #1f5aa0; }
.score-col-op .score-col-title { color: #a35a15; }
.score-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 14px;
  padding: 3px 0;
  color: #3f3f3f;
}
.score-label { color: #6a6a6a; }
.score-value { font-weight: 800; color: #1f1f1f; font-size: 16px; }
.score-value-lost { color: #b33a3a; }
.score-breakdown { margin-top: 10px; }
.score-breakdown-title {
  font-size: 12px;
  font-weight: 800;
  color: #6a7480;
  letter-spacing: 1px;
  margin: 6px 0 4px;
}
.score-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 6px;
  margin-bottom: 6px;
}
.score-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #eef3f7;
  border-radius: 999px;
  padding: 2px 9px;
  font-size: 12px;
  color: #3a3a3a;
  line-height: 1.6;
}
.score-chip-name { color: #5e6a73; font-weight: 700; }
.score-chip-count { font-weight: 800; color: #1f1f1f; }
.score-chip-lost { opacity: 0.55; text-decoration: line-through; }
.score-hidden-note {
  color: #8b949c;
  font-size: 12px;
  line-height: 1.5;
  padding: 4px 2px;
}
.new-game-section label { display: block; font-size: 16px; margin-bottom: 4px; cursor: pointer; }
.new-game-section .option-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
  margin-bottom: 10px;
}
.new-game-section .opt-btn, .new-game-section button {
  width: 100%;
  padding: 10px 8px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  cursor: pointer;
  transition: all 0.12s ease;
}
.new-game-section .opt-btn {
  background: linear-gradient(180deg, #f8f9fb 0%, #eef2f6 100%);
  color: #2d2d2d;
  font-weight: 700;
  border-color: #cfd7df;
  box-shadow: 0 2px 4px rgba(0,0,0,.06);
}
.new-game-section .opt-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 10px rgba(0,0,0,.12);
}
.new-game-section .opt-btn.active {
  background: linear-gradient(180deg, #678e44 0%, #557836 100%);
  color: #fff;
  border-color: #496c2f;
  box-shadow: 0 0 0 2px rgba(90,122,58,.2), 0 5px 12px rgba(0,0,0,.16);
}
.new-game-section button {
  background: linear-gradient(180deg, #678e44 0%, #557836 100%);
  color: #fff;
  border: none;
  font-weight: 800;
  margin-top: 10px;
  box-shadow: 0 4px 10px rgba(85,120,54,.3);
}
.new-game-section button:hover {
  background: linear-gradient(180deg, #5d8340 0%, #4b6b30 100%);
  transform: translateY(-1px);
}
.new-game-section .opt-btn:focus-visible,
.new-game-section button:focus-visible {
  outline: 2px solid #2d7ff9;
  outline-offset: 2px;
}

/* ---- Compact top toolbar variant of .new-game-section ---- */
.new-game-section.top-toolbar {
  display: flex;
  flex-wrap: nowrap;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
}
.new-game-section.top-toolbar h3 { display: none; }
.tb-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; white-space: nowrap; }
.tb-label { font-size: 16px; color: #4a4a4a; font-weight: 700; }
.new-game-section.top-toolbar .option-group {
  display: inline-flex;
  grid-template-columns: unset;
  gap: 0;
  margin: 0;
  border-radius: 8px;
  border: 1px solid #cfd7df;
  overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.4);
}
.new-game-section.top-toolbar .opt-btn {
  width: auto;
  padding: 5px 12px;
  font-size: 13px;
  border-radius: 0;
  border: none;
  border-left: 1px solid #cfd7df;
  box-shadow: none;
  margin: 0;
}
.new-game-section.top-toolbar .opt-btn:first-child { border-left: none; }
.new-game-section.top-toolbar .opt-btn:hover {
  transform: none;
  box-shadow: none;
}
.new-game-section.top-toolbar .opt-btn.active { box-shadow: none; }
.new-game-section.top-toolbar .tb-start-btn {
  margin: 0 0 0 auto;
  padding: 6px 18px;
  font-size: 14px;
  width: auto;
  border-radius: 8px;
  flex-shrink: 0;
  white-space: nowrap;
}
@media (max-width: 1100px) {
  .page { flex-direction: column; align-items: center; }
  .panel { width: min(680px, 100%); }
  .panel-grid {
    grid-template-columns: 1fr;
    grid-template-areas:
      "status"
      "move"
      "score"
      "battle";
  }
  .new-game-section.top-toolbar { flex-wrap: wrap; justify-content: flex-start; }
  .new-game-section.top-toolbar .tb-start-btn { margin-left: auto; }
}
</style>
</head>
<body>

<div class="page">
  <div class="board-area">
    <div class="board-wrapper">
      <div class="board-title">陆 战 棋</div>
      <svg id="board-svg"></svg>
      <table id="board"></table>
    </div>
  </div>

  <div class="panel">
    <div class="card new-game-section top-toolbar">
      <div class="tb-group">
        <span class="tb-label">模式</span>
        <input type="hidden" id="opt-mode" value="hidden">
        <div class="option-group" id="mode-group">
          <button type="button" class="opt-btn active" data-target="opt-mode" data-value="hidden">暗手</button>
          <button type="button" class="opt-btn" data-target="opt-mode" data-value="open">明手</button>
        </div>
      </div>
      <div class="tb-group">
        <span class="tb-label">难度</span>
        <input type="hidden" id="opt-diff" value="easy">
        <div class="option-group" id="diff-group">
          <button type="button" class="opt-btn active" data-target="opt-diff" data-value="easy">简单</button>
          <button type="button" class="opt-btn" data-target="opt-diff" data-value="hard">困难</button>
        </div>
      </div>
      <button class="tb-start-btn" onclick="startGame()">开始游戏</button>
    </div>

    <div class="panel-grid">
      <div class="card" id="status-card">
        <h3>对局状态</h3>
        <div id="turn-display" class="turn-indicator">等待开始</div>
        <div id="result-display"></div>
        <div class="status-row">
          <span class="status-label">模式</span>
          <span class="status-value" id="s-mode">—</span>
        </div>
        <div class="status-row">
          <span class="status-label">难度</span>
          <span class="status-value" id="s-diff">—</span>
        </div>
      </div>
      <div class="card" id="move-card">
        <h3>最近走子</h3>
        <div id="last-move" class="last-move"></div>
      </div>
      <div class="card" id="scoreboard-card">
        <h3>双方战况</h3>
        <div class="score-grid">
          <div class="score-col score-col-me">
            <div class="score-col-title">我方</div>
            <div class="score-row">
              <span class="score-label">剩余</span>
              <span class="score-value" id="me-alive">—</span>
            </div>
            <div class="score-row">
              <span class="score-label">已损失</span>
              <span class="score-value score-value-lost" id="me-lost">—</span>
            </div>
          </div>
          <div class="score-col score-col-op">
            <div class="score-col-title">对方</div>
            <div class="score-row">
              <span class="score-label">剩余</span>
              <span class="score-value" id="op-alive">—</span>
            </div>
            <div class="score-row">
              <span class="score-label">已损失</span>
              <span class="score-value score-value-lost" id="op-lost">—</span>
            </div>
          </div>
        </div>
        <div class="score-breakdown" id="score-breakdown"></div>
      </div>
      <div class="card" id="battle-card">
        <h3>最近战斗记录</h3>
        <div id="battle-log" class="battle-log"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ==============================================================
   Board connection topology
   ============================================================== */
const BOARD_CONNECTIONS = (() => {
  const conns = [];
  const rrSet = new Set();
  for (let i = 1; i <= 10; i++) { rrSet.add(`${i},0`); rrSet.add(`${i},4`); }
  for (let c = 0; c < 5; c++) {
    for (const r of [1, 5, 6, 10]) rrSet.add(`${r},${c}`);
  }
  const isRR = (r, c) => rrSet.has(`${r},${c}`);
  const edgeType = (r1, c1, r2, c2) =>
    (isRR(r1, c1) && isRR(r2, c2)) ? 'railroad' : 'road';

  for (let c = 0; c < 5; c++) {
    for (let r = 0; r < 11; r++) {
      if (r === 5 && (c === 1 || c === 3)) continue;
      conns.push({ from: [r, c], to: [r + 1, c], type: edgeType(r, c, r + 1, c) });
    }
  }
  for (let r = 0; r < 12; r++) {
    for (let c = 0; c < 4; c++) {
      conns.push({ from: [r, c], to: [r, c + 1], type: edgeType(r, c, r, c + 1) });
    }
  }
  const camps = [[2,1],[2,3],[3,2],[4,1],[4,3],[7,1],[7,3],[8,2],[9,1],[9,3]];
  const seen = new Set();
  const ek = (r1,c1,r2,c2) => {
    if (r1<r2||(r1===r2&&c1<c2)) return `${r1},${c1}-${r2},${c2}`;
    return `${r2},${c2}-${r1},${c1}`;
  };
  for (const [cr,cc] of camps) {
    for (const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
      const nr=cr+dr, nc=cc+dc;
      if (nr>=0&&nr<=11&&nc>=0&&nc<=4) {
        const key=ek(cr,cc,nr,nc);
        if (!seen.has(key)) { seen.add(key); conns.push({from:[cr,cc],to:[nr,nc],type:'camp'}); }
      }
    }
  }
  return conns;
})();

const LINE_STYLES = {
  railroad: { stroke: '#2a1a08', width: 3.5, dash: '' },
  road:     { stroke: '#4a3a20', width: 1.5, dash: '' },
  camp:     { stroke: '#4a3a20', width: 1.2, dash: '4,3' },
};

/* --- cell center cache (refreshed on render) --- */
let cellCenters = {};

function getCellRect(r, c) {
  const td = document.querySelector(`#board td[data-row="${r}"][data-col="${c}"]`);
  if (!td) return null;
  return td.getBoundingClientRect();
}

function refreshCenters() {
  cellCenters = {};
  const wrapperRect = document.querySelector('.board-wrapper').getBoundingClientRect();
  document.querySelectorAll('#board td[data-row]').forEach(td => {
    const r = parseInt(td.dataset.row), c = parseInt(td.dataset.col);
    const rect = td.getBoundingClientRect();
    cellCenters[`${r},${c}`] = {
      x: rect.left + rect.width/2 - wrapperRect.left,
      y: rect.top + rect.height/2 - wrapperRect.top,
    };
  });
}

/* --- SVG rendering with optional path highlights --- */
let svgHighlightEdges = []; // [{from:[r,c], to:[r,c]}] for path highlight

function renderSVG() {
  const svg = document.getElementById('board-svg');
  const wrapper = document.querySelector('.board-wrapper');
  refreshCenters();

  const w = wrapper.offsetWidth, h = wrapper.offsetHeight;
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);

  const order = ['road', 'camp', 'railroad'];
  const groups = { road: [], camp: [], railroad: [] };

  for (const conn of BOARD_CONNECTIONS) {
    const a = cellCenters[`${conn.from[0]},${conn.from[1]}`];
    const b = cellCenters[`${conn.to[0]},${conn.to[1]}`];
    if (!a || !b) continue;
    const style = LINE_STYLES[conn.type];
    let line = `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" `;
    line += `stroke="${style.stroke}" stroke-width="${style.width}" stroke-linecap="round"`;
    if (style.dash) line += ` stroke-dasharray="${style.dash}"`;
    line += ` data-from="${conn.from}" data-to="${conn.to}"/>`;
    groups[conn.type].push(line);
  }

  const rrMarks = [];
  for (const conn of BOARD_CONNECTIONS) {
    if (conn.type !== 'railroad') continue;
    const a = cellCenters[`${conn.from[0]},${conn.from[1]}`];
    const b = cellCenters[`${conn.to[0]},${conn.to[1]}`];
    if (!a || !b) continue;
    const dx = b.x-a.x, dy = b.y-a.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    if (len < 1) continue;
    const nx = -dy/len, ny = dx/len, tickLen = 4;
    const count = Math.max(2, Math.round(len/16));
    for (let i = 1; i < count; i++) {
      const t = i/count, mx = a.x+dx*t, my = a.y+dy*t;
      rrMarks.push(`<line x1="${mx-nx*tickLen}" y1="${my-ny*tickLen}" x2="${mx+nx*tickLen}" y2="${my+ny*tickLen}" stroke="#2a1a08" stroke-width="1.2"/>`);
    }
  }

  // Path highlight lines (on top of everything)
  const traceLines = [];
  const traceRecords = [
    { rec: getCurrentMoveRecord('player'), cls: 'svg-trace-player', marker: 'trace-arrow-player' },
    { rec: getCurrentMoveRecord('ai'), cls: 'svg-trace-ai', marker: 'trace-arrow-ai' },
  ];
  for (const t of traceRecords) {
    const rec = t.rec;
    if (!rec || !rec.from || !rec.to) continue;
    const path = findMovePath(rec.from[0], rec.from[1], rec.to[0], rec.to[1]);
    const points = [];
    for (const pt of path) {
      const center = cellCenters[`${pt[0]},${pt[1]}`];
      if (center) points.push(`${center.x},${center.y}`);
    }
    if (points.length >= 2) {
      traceLines.push(`<polyline points="${points.join(' ')}" class="${t.cls}" marker-end="url(#${t.marker})"/>`);
    }
  }

  const hlLines = [];
  for (const hl of svgHighlightEdges) {
    const a = cellCenters[`${hl.from[0]},${hl.from[1]}`];
    const b = cellCenters[`${hl.to[0]},${hl.to[1]}`];
    if (a && b) {
      hlLines.push(`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" class="svg-path-hl"/>`);
    }
  }

  const arrowDefs = `
    <defs>
      <marker id="trace-arrow-player" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,8 L8,4 z" fill="#2d7ff9"/>
      </marker>
      <marker id="trace-arrow-ai" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,8 L8,4 z" fill="#f29a2e"/>
      </marker>
    </defs>
  `;

  svg.innerHTML = arrowDefs + order.map(t => groups[t].join('')).join('') + rrMarks.join('') + traceLines.join('') + hlLines.join('');
}

/* ==============================================================
   Path-finding for move visualization
   ============================================================== */

// Railroad position set (mirrors algorithms.py railroadPosts)
const RR_SET = new Set();
for (let i = 1; i <= 10; i++) { RR_SET.add(`${i},0`); RR_SET.add(`${i},4`); }
for (let c = 0; c < 5; c++) {
  for (const r of [1, 5, 6, 10]) RR_SET.add(`${r},${c}`);
}

// Railroad adjacency: at front-line junctions (5,1)(5,3)(6,1)(6,3) only horizontal
function rrNeighbors(r, c) {
  const dirs = [`5,1`,`5,3`,`6,1`,`6,3`].includes(`${r},${c}`)
    ? [[0,-1],[0,1]]
    : [[-1,0],[1,0],[0,-1],[0,1]];
  const out = [];
  for (const [dr, dc] of dirs) {
    const nr = r+dr, nc = c+dc;
    if (RR_SET.has(`${nr},${nc}`)) out.push([nr, nc]);
  }
  return out;
}

// BFS shortest path on railroad graph
function bfsRailroadPath(fr, fc, tr, tc) {
  const startKey = `${fr},${fc}`, endKey = `${tr},${tc}`;
  if (!RR_SET.has(startKey) || !RR_SET.has(endKey)) return null;
  const prev = new Map();
  prev.set(startKey, null);
  const queue = [[fr, fc]];
  while (queue.length > 0) {
    const [r, c] = queue.shift();
    if (r === tr && c === tc) {
      // Reconstruct path
      const path = [];
      let key = endKey;
      while (key !== null) {
        const [pr, pc] = key.split(',').map(Number);
        path.unshift([pr, pc]);
        key = prev.get(key);
      }
      return path;
    }
    for (const [nr, nc] of rrNeighbors(r, c)) {
      const nk = `${nr},${nc}`;
      if (!prev.has(nk)) {
        prev.set(nk, `${r},${c}`);
        queue.push([nr, nc]);
      }
    }
  }
  return null;
}

/**
 * Compute the waypoint path for a move: [[r,c], [r,c], ...]
 * - Single step: 2 waypoints
 * - Railroad straight line: all intermediate cells
 * - Railroad with turns (sapper): BFS shortest path
 */
function findMovePath(fr, fc, tr, tc) {
  const dr = Math.abs(tr - fr), dc = Math.abs(tc - fc);
  // Adjacent move (1 step orthogonal or diagonal)
  if (dr <= 1 && dc <= 1) return [[fr, fc], [tr, tc]];
  // Both on railroad → BFS for shortest path (handles straight + turns)
  if (RR_SET.has(`${fr},${fc}`) && RR_SET.has(`${tr},${tc}`)) {
    const path = bfsRailroadPath(fr, fc, tr, tc);
    if (path) return path;
  }
  // Fallback: direct (shouldn't happen for valid moves)
  return [[fr, fc], [tr, tc]];
}

// Convert a waypoint path to edge list (for SVG highlight)
function pathToEdges(path) {
  const edges = [];
  for (let i = 0; i < path.length - 1; i++) {
    edges.push({ from: path[i], to: path[i + 1] });
  }
  return edges;
}

/* ==============================================================
   Animation: slide ghost piece along a multi-segment path
   ============================================================== */
function animateMove(path, pieceText, side) {
  return new Promise(resolve => {
    if (path.length < 2) { resolve(); return; }

    const wrapper = document.querySelector('.board-wrapper');
    const wrapperRect = wrapper.getBoundingClientRect();

    // Get pixel rects for first and all waypoints
    const firstTd = document.querySelector(`#board td[data-row="${path[0][0]}"][data-col="${path[0][1]}"]`);
    if (!firstTd) { resolve(); return; }
    const firstRect = firstTd.getBoundingClientRect();

    // Create ghost piece at start position
    const ghost = document.createElement('div');
    ghost.className = 'ghost-piece side-' + side;
    ghost.textContent = pieceText;
    ghost.style.width = firstRect.width + 'px';
    ghost.style.height = firstRect.height + 'px';
    ghost.style.left = (firstRect.left - wrapperRect.left) + 'px';
    ghost.style.top = (firstRect.top - wrapperRect.top) + 'px';
    wrapper.appendChild(ghost);

    // Hide source cell text
    firstTd.style.color = 'transparent';
    firstTd.style.textShadow = 'none';

    // Build keyframes from waypoint pixel positions (all relative to start)
    const startX = firstRect.left - wrapperRect.left;
    const startY = firstRect.top - wrapperRect.top;
    const keyframes = [];
    let totalDist = 0;
    const segDists = [];

    for (let i = 0; i < path.length; i++) {
      const td = document.querySelector(`#board td[data-row="${path[i][0]}"][data-col="${path[i][1]}"]`);
      if (!td) { ghost.remove(); resolve(); return; }
      const rect = td.getBoundingClientRect();
      const x = rect.left - wrapperRect.left - startX;
      const y = rect.top - wrapperRect.top - startY;
      if (i > 0) {
        const prevTd = document.querySelector(`#board td[data-row="${path[i-1][0]}"][data-col="${path[i-1][1]}"]`);
        const prevRect = prevTd.getBoundingClientRect();
        const dx = rect.left - prevRect.left, dy = rect.top - prevRect.top;
        const d = Math.sqrt(dx*dx + dy*dy);
        segDists.push(d);
        totalDist += d;
      }
      keyframes.push({ transform: `translate(${x}px, ${y}px)`, opacity: 1 });
    }

    // Compute offset for each keyframe (0 to 1) proportional to cumulative distance
    if (totalDist < 1) totalDist = 1;
    const offsets = [0];
    let cumDist = 0;
    for (let i = 0; i < segDists.length; i++) {
      cumDist += segDists[i];
      offsets.push(cumDist / totalDist);
    }
    for (let i = 0; i < keyframes.length; i++) {
      keyframes[i].offset = offsets[i];
    }

    // Duration: proportional to path length, clamped
    const duration = Math.min(600, Math.max(200, totalDist * 0.8));

    const anim = ghost.animate(keyframes, {
      duration,
      easing: 'linear',  // linear overall; each segment is constant speed
      fill: 'forwards',
    });

    anim.onfinish = () => {
      ghost.remove();
      resolve();
    };
  });
}

/* ==============================================================
   Game state
   ============================================================== */
let board = null;
let selected = null;
let legalMoves = [];
let turn = null;
let winner = null;
let animating = false;
let gameMode = 'hidden';
let gameDifficulty = 'easy';
let overlays = [];
let lastPlayerMove = null;
let lastAiMove = null;
let lastMoveRecords = { player: null, ai: null };
const SHOW_MOVE_CURSOR_LABELS = false;
const MAX_BATTLE_RECORDS = 40;
let battleRecords = [];
const moveSounds = {
  player: new Audio('/static/player-move.ogg'),
  ai: new Audio('/static/ai-move.ogg'),
};
let moveSoundUnlocked = false;

moveSounds.player.preload = 'auto';
moveSounds.ai.preload = 'auto';

function unlockMoveSounds() {
  if (moveSoundUnlocked) return;
  moveSoundUnlocked = true;
  [moveSounds.player, moveSounds.ai].forEach(a => {
    const oldMuted = a.muted;
    a.muted = true;
    const p = a.play();
    if (p && typeof p.then === 'function') {
      p.then(() => {
        a.pause();
        a.currentTime = 0;
        a.muted = oldMuted;
      }).catch(() => {
        a.muted = oldMuted;
      });
    } else {
      a.pause();
      a.currentTime = 0;
      a.muted = oldMuted;
    }
  });
}

function playMoveSound(kind) {
  if (!moveSoundUnlocked) return;
  const audio = moveSounds[kind];
  if (!audio) return;
  try {
    audio.pause();
    audio.currentTime = 0;
    const p = audio.play();
    if (p && typeof p.catch === 'function') p.catch(() => {});
  } catch (_) {}
}

document.addEventListener('pointerdown', unlockMoveSounds, { once: true });
document.addEventListener('keydown', unlockMoveSounds, { once: true });

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function posLabel(r, c) {
  const cols = 'ABCDE';
  return cols[c] + (12 - r);
}

function fallbackMoveRecord(move) {
  if (!move) return null;
  return { from: move.from, to: move.to, piece: null };
}

function getCurrentMoveRecord(side) {
  if (side === 'player') return lastMoveRecords.player || fallbackMoveRecord(lastPlayerMove);
  if (side === 'ai') return lastMoveRecords.ai || fallbackMoveRecord(lastAiMove);
  return null;
}

function isTracePointCell(r, c) {
  const records = [getCurrentMoveRecord('player'), getCurrentMoveRecord('ai')];
  for (const rec of records) {
    if (!rec || !rec.from || !rec.to) continue;
    if ((rec.from[0] === r && rec.from[1] === c) || (rec.to[0] === r && rec.to[1] === c)) {
      return true;
    }
  }
  return false;
}

function getLastMoveCursorsForCell(r, c) {
  if (!SHOW_MOVE_CURSOR_LABELS) return [];
  const cursors = [];
  const playerRecord = getCurrentMoveRecord('player');
  const aiRecord = getCurrentMoveRecord('ai');
  if (playerRecord) {
    if (playerRecord.from[0] === r && playerRecord.from[1] === c) {
      cursors.push({ cls: 'cursor-player-from', label: 'YF' });
    }
    if (playerRecord.to[0] === r && playerRecord.to[1] === c) {
      cursors.push({ cls: 'cursor-player-to', label: 'YT' });
    }
  }
  if (aiRecord) {
    if (aiRecord.from[0] === r && aiRecord.from[1] === c) {
      cursors.push({ cls: 'cursor-ai-from', label: 'OF' });
    }
    if (aiRecord.to[0] === r && aiRecord.to[1] === c) {
      cursors.push({ cls: 'cursor-ai-to', label: 'OT' });
    }
  }
  return cursors;
}

function formatSide(side) {
  return side === 'B' ? '\u4f60' : '\u5bf9\u65b9';
}

function formatPieceName(name) {
  return name || '\u672a\u77e5\u68cb\u5b50';
}

function battleRecordText(evt) {
  if (!evt) return '';
  const attacker = `${formatSide(evt.attacker_side)}:${formatPieceName(evt.attacker_name)}`;
  const defender = `${formatSide(evt.defender_side)}:${formatPieceName(evt.defender_name)}`;
  if (evt.kind === 'sapper_mine') return `${attacker} \u6392\u9664 ${defender}`;
  if (evt.kind === 'mutual') return `${attacker} \u4e0e ${defender} \u540c\u5f52\u4e8e\u5c3d`;
  if (evt.kind === 'attacker_win') return `${attacker} \u5403\u6389 ${defender}`;
  if (evt.kind === 'defender_win') return `${defender} \u5403\u6389 ${attacker}`;
  return '';
}

function renderBattleLog() {
  const el = document.getElementById('battle-log');
  if (!el) return;
  if (!battleRecords.length) {
    el.innerHTML = '<div class="battle-log-empty">\u6682\u65e0\u6218\u6597\u8bb0\u5f55</div>';
    return;
  }
  let html = '';
  for (let i = 0; i < battleRecords.length; i++) {
    const item = battleRecords[i];
    const cls = i === 0 ? 'battle-log-item battle-log-latest' : 'battle-log-item';
    html += `<div class="${cls}">${item.text}</div>`;
  }
  el.innerHTML = html;
}

function appendBattleRecords(events) {
  if (!Array.isArray(events) || events.length === 0) return;
  for (const evt of events) {
    const text = battleRecordText(evt);
    if (!text) continue;
    battleRecords.unshift({ text, evt });
  }
  if (battleRecords.length > MAX_BATTLE_RECORDS) {
    battleRecords = battleRecords.slice(0, MAX_BATTLE_RECORDS);
  }
  renderBattleLog();
}

// Derive names of AI (side A) pieces whose identity became public through
// battle. Safe to show even in 暗手 mode — this info is already visible in
// the battle-log card.
function computeRevealedOppPieces() {
  const counts = {};
  for (const item of battleRecords) {
    const evt = item.evt;
    if (!evt) continue;
    if (evt.attacker_side === 'A' && evt.attacker_name) {
      counts[evt.attacker_name] = (counts[evt.attacker_name] || 0) + 1;
    }
    if (evt.defender_side === 'A' && evt.defender_name) {
      counts[evt.defender_name] = (counts[evt.defender_name] || 0) + 1;
    }
  }
  return counts;
}

/* ==============================================================
   Scoreboard
   ============================================================== */
const PIECES_PER_SIDE = 25;
// Display order for 兵种细分 — from highest rank to lowest / special
const PIECE_ORDER_FOR_DISPLAY = [
  '司令', '军长', '师长', '旅长', '团长', '营长',
  '连长', '排长', '工兵', '炸弹', '地雷', '军旗',
];
// Initial count of each piece type per side (matches make_pieces in app.py)
const INITIAL_PIECE_COUNTS = {
  '司令': 1, '军长': 1, '师长': 2, '旅长': 2, '团长': 2, '营长': 2,
  '连长': 3, '排长': 3, '工兵': 3, '炸弹': 2, '地雷': 3, '军旗': 1,
};

function computeSideStats(side) {
  const stats = { alive: 0, byName: {} };
  if (!board) return stats;
  for (let r = 0; r < 12; r++) {
    for (let c = 0; c < 5; c++) {
      const p = board[r][c].piece;
      if (!p || p.side !== side) continue;
      stats.alive += 1;
      if (p.name) {
        stats.byName[p.name] = (stats.byName[p.name] || 0) + 1;
      }
    }
  }
  return stats;
}

function renderBreakdownChips(byName, initialCounts) {
  const chips = [];
  for (const name of PIECE_ORDER_FOR_DISPLAY) {
    const initial = initialCounts[name] || 0;
    const alive = byName[name] || 0;
    if (initial === 0) continue;
    const lost = alive === 0;
    const cls = lost ? 'score-chip score-chip-lost' : 'score-chip';
    chips.push(`<span class="${cls}"><span class="score-chip-name">${name}</span><span class="score-chip-count">${alive}/${initial}</span></span>`);
  }
  return `<div class="score-chip-row">${chips.join('')}</div>`;
}

function renderScoreboard() {
  const meAliveEl = document.getElementById('me-alive');
  const meLostEl = document.getElementById('me-lost');
  const opAliveEl = document.getElementById('op-alive');
  const opLostEl = document.getElementById('op-lost');
  const breakdownEl = document.getElementById('score-breakdown');
  if (!meAliveEl || !breakdownEl) return;

  if (!board) {
    meAliveEl.textContent = '—';
    meLostEl.textContent = '—';
    opAliveEl.textContent = '—';
    opLostEl.textContent = '—';
    breakdownEl.innerHTML = '';
    return;
  }

  const me = computeSideStats('B');
  const op = computeSideStats('A');
  meAliveEl.textContent = `${me.alive} / ${PIECES_PER_SIDE}`;
  meLostEl.textContent = String(PIECES_PER_SIDE - me.alive);
  opAliveEl.textContent = `${op.alive} / ${PIECES_PER_SIDE}`;
  opLostEl.textContent = String(PIECES_PER_SIDE - op.alive);

  let html = '';
  html += '<div class="score-breakdown-title">我方兵种</div>';
  html += renderBreakdownChips(me.byName, INITIAL_PIECE_COUNTS);

  html += '<div class="score-breakdown-title">对方兵种</div>';
  if (gameMode === 'open') {
    html += renderBreakdownChips(op.byName, INITIAL_PIECE_COUNTS);
  } else {
    // 暗棋模式：具体分布保密；但从战斗记录派生的"已暴露身份"属于公开信息
    const revealed = computeRevealedOppPieces();
    const revealedNames = Object.keys(revealed);
    if (revealedNames.length > 0) {
      const chips = PIECE_ORDER_FOR_DISPLAY
        .filter(n => revealed[n])
        .map(n => `<span class="score-chip"><span class="score-chip-name">${n}</span><span class="score-chip-count">×${revealed[n]}</span></span>`)
        .join('');
      html += `<div class="score-chip-row">${chips}</div>`;
      html += '<div class="score-hidden-note">以上为战斗中已暴露过的敌方棋子；其他仍按暗手规则隐藏。</div>';
    } else {
      html += '<div class="score-hidden-note">暗手模式下对方兵种按规则隐藏，仅能从战斗记录中获知已暴露的棋子。</div>';
    }
  }
  breakdownEl.innerHTML = html;
}

function initOptionButtons() {
  const groups = document.querySelectorAll('.new-game-section .option-group');
  for (const group of groups) {
    const buttons = group.querySelectorAll('.opt-btn');
    for (const btn of buttons) {
      btn.addEventListener('click', () => {
        const targetId = btn.dataset.target;
        const target = document.getElementById(targetId);
        if (!target) return;
        target.value = btn.dataset.value;
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    }
  }
}

async function startGame() {
  gameMode = document.getElementById('opt-mode').value;
  gameDifficulty = document.getElementById('opt-diff').value;
  const res = await fetch('/api/new-game', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({difficulty: gameDifficulty, mode: gameMode})
  });
  const data = await res.json();
  board = data.board;
  turn = data.turn;
  winner = data.winner;
  gameMode = data.mode;
  selected = null;
  legalMoves = [];
  overlays = [];
  svgHighlightEdges = [];
  animating = false;
  lastPlayerMove = null;
  lastAiMove = null;
  lastMoveRecords = { player: null, ai: null };
  battleRecords = [];
  render();
  updatePanel();
  renderBattleLog();
}

function updatePanel() {
  document.getElementById('s-mode').textContent = gameMode === 'open' ? '明手' : '暗手';
  document.getElementById('s-diff').textContent = gameDifficulty === 'hard' ? '困难' : '简单';
  const turnEl = document.getElementById('turn-display');
  const resultEl = document.getElementById('result-display');
  resultEl.innerHTML = '';
  if (!board) {
    turnEl.textContent = '等待开始'; turnEl.className = 'turn-indicator';
  } else if (winner) {
    turnEl.textContent = '';
    const div = document.createElement('div');
    div.className = winner === 'B' ? 'result result-win' : 'result result-lose';
    div.textContent = winner === 'B' ? '你赢了！' : '你输了！';
    resultEl.appendChild(div);
  } else if (animating) {
    turnEl.textContent = 'AI 思考中…';
    turnEl.className = 'turn-indicator turn-thinking';
  } else if (turn === 'B') {
    turnEl.textContent = '你的回合';
    turnEl.className = 'turn-indicator turn-player';
  } else {
    turnEl.textContent = 'AI 回合';
    turnEl.className = 'turn-indicator turn-ai';
  }
  const moveEl = document.getElementById('last-move');
  if (lastPlayerMove || lastAiMove) {
    let html = '';
    if (lastPlayerMove) {
      const pm = lastPlayerMove;
      html += '<div class="player-move">你：' + posLabel(pm.from[0],pm.from[1]) + ' → ' + posLabel(pm.to[0],pm.to[1]) + '</div>';
    }
    if (lastAiMove) {
      const am = lastAiMove;
      html += '<div class="ai-move-text">AI：' + posLabel(am.from[0],am.from[1]) + ' → ' + posLabel(am.to[0],am.to[1]) + '</div>';
    }
    moveEl.innerHTML = html;
  } else {
    moveEl.innerHTML = '<div class="last-move-empty">暂无走子记录</div>';
  }
  renderScoreboard();
}

function render() {
  const table = document.getElementById('board');
  table.innerHTML = '';
  if (!board) { document.getElementById('board-svg').innerHTML = ''; return; }
  for (let r = 0; r < 12; r++) {
    if (r === 6) {
      const sep = document.createElement('tr');
      sep.className = 'river';
      for (let c = 0; c < 5; c++) sep.appendChild(document.createElement('td'));
      table.appendChild(sep);
    }
    const tr = document.createElement('tr');
    for (let c = 0; c < 5; c++) {
      const td = document.createElement('td');
      const cell = board[r][c];
      td.className = cell.type;
      if (cell.piece) {
        td.classList.add('side-' + cell.piece.side);
        td.textContent = cell.piece.name || '?';
      } else {
        td.classList.add('empty');
        if (cell.type === 'camp') td.textContent = '营';
        else if (cell.type === 'hq') td.textContent = '营';
      }
      if (selected && selected.row === r && selected.col === c) td.classList.add('selected');
      if (legalMoves.some(m => m[0] === r && m[1] === c)) td.classList.add('highlight');
      if (isTracePointCell(r, c)) td.classList.add('trace-point');
      for (const o of overlays) {
        if (o.row === r && o.col === c) td.classList.add(o.cls);
      }
      const moveCursors = getLastMoveCursorsForCell(r, c);
      for (const cur of moveCursors) {
        const marker = document.createElement('span');
        marker.className = `move-cursor ${cur.cls}`;
        marker.textContent = cur.label;
        td.appendChild(marker);
      }
      td.dataset.row = r;
      td.dataset.col = c;
      td.addEventListener('click', onCellClick);
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
  requestAnimationFrame(renderSVG);
}

async function onCellClick(e) {
  if (!board || winner || animating) return;
  if (turn !== 'B') return;
  const r = parseInt(e.currentTarget.dataset.row);
  const c = parseInt(e.currentTarget.dataset.col);
  if (selected && legalMoves.some(m => m[0] === r && m[1] === c)) {
    // Lock immediately before any await to prevent double-fire
    animating = true;
    await makeMove(selected.row, selected.col, r, c);
    return;
  }
  const cell = board[r][c];
  if (cell.piece && cell.piece.side === 'B') {
    selected = {row: r, col: c};
    const res = await fetch(`/api/legal-moves?row=${r}&col=${c}`);
    // Re-check state after await — a concurrent click may have changed things
    if (animating || winner) return;
    const data = await res.json();
    legalMoves = data.moves;
    overlays = [];
    svgHighlightEdges = [];
    render();
    return;
  }
  selected = null;
  legalMoves = [];
  overlays = [];
  svgHighlightEdges = [];
  render();
}

/* ==============================================================
   makeMove — the full animated turn sequence
   ============================================================== */
async function makeMove(fr, fc, tr, tc) {
  // animating is already true (set by onCellClick before calling us)
  try {
    // Capture pre-move info
    const movingPiece = board[fr][fc].piece;
    const targetHadPiece = board[tr][tc].piece != null;
    const pieceText = movingPiece.name || '?';
    const pieceSide = movingPiece.side;

    selected = null;
    legalMoves = [];
    updatePanel();

    // ---- Phase 1: highlight + path + player slide animation ----
    const playerPath = findMovePath(fr, fc, tr, tc);
    overlays = [
      { row: fr, col: fc, cls: 'move-from' },
      { row: tr, col: tc, cls: 'move-to' },
    ];
    svgHighlightEdges = pathToEdges(playerPath);
    render();

    // Fire API in background — do NOT await yet
    const apiPromise = fetch('/api/move', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({from_row: fr, from_col: fc, to_row: tr, to_col: tc})
    }).then(r => r.json());

    await delay(150);
    playMoveSound('player');
    await animateMove(playerPath, pieceText, pieceSide);

    // ---- Phase 2: optimistic local update for player move ----
    // Apply player move locally so the user sees the result immediately,
    // even if the API (which includes AI thinking) hasn't returned yet.
    const preBoard = board; // save in case we need it
    // Move piece locally
    const localBoard = JSON.parse(JSON.stringify(board));
    if (localBoard[tr][tc].piece === null || localBoard[tr][tc].piece.side === pieceSide) {
      // Simple move to empty cell (or own piece — shouldn't happen but safe)
      localBoard[tr][tc].piece = localBoard[fr][fc].piece;
      localBoard[fr][fc].piece = null;
    } else {
      // Capture — we don't know the exact outcome, just clear source
      // The real result comes from the API; for now show the moving piece at destination
      localBoard[tr][tc].piece = localBoard[fr][fc].piece;
      localBoard[fr][fc].piece = null;
    }
    board = localBoard;
    lastPlayerMove = { from: [fr, fc], to: [tr, tc] };
    lastAiMove = null;
    lastMoveRecords.player = {
      from: [fr, fc],
      to: [tr, tc],
      piece: { name: pieceText, side: pieceSide, order: movingPiece.order }
    };
    lastMoveRecords.ai = null;
    overlays = [
      { row: fr, col: fc, cls: 'move-from' },
      { row: tr, col: tc, cls: 'move-to' },
    ];
    svgHighlightEdges = [];
    render();
    updatePanel();

    if (targetHadPiece) {
      const dstTd = document.querySelector(`#board td[data-row="${tr}"][data-col="${tc}"]`);
      if (dstTd) dstTd.classList.add('capture-effect');
    }

    await delay(500);

    // ---- Phase 3: show "AI thinking" while waiting for API ----
    overlays = [];
    svgHighlightEdges = [];
    render();
    updatePanel(); // shows "AI 思考中..." because animating is still true

    // NOW wait for API (may already be done, or may take seconds on hard mode)
    const data = await apiPromise;
    appendBattleRecords(data.battle_events);

    // Apply the real board_after_player (corrects any optimistic inaccuracy)
    board = data.board_after_player;
    lastPlayerMove = data.player_move;
    lastMoveRecords.player = (data.move_records && data.move_records.player) ? data.move_records.player : fallbackMoveRecord(data.player_move);
    lastMoveRecords.ai = null;
    render();

    // ---- Phase 4: AI animation ----
    if (data.ai_move && !data.winner) {
      const aiFrom = data.ai_move.from;
      const aiTo = data.ai_move.to;
      const aiCell = data.board_after_player[aiFrom[0]][aiFrom[1]];
      const aiPieceText = (aiCell.piece && aiCell.piece.name) ? aiCell.piece.name : '?';
      const aiPieceSide = aiCell.piece ? aiCell.piece.side : 'A';
      const aiTargetHad = data.board_after_player[aiTo[0]][aiTo[1]].piece != null;

      const aiPath = findMovePath(aiFrom[0], aiFrom[1], aiTo[0], aiTo[1]);
      overlays = [
        { row: aiFrom[0], col: aiFrom[1], cls: 'ai-from' },
        { row: aiTo[0], col: aiTo[1], cls: 'ai-to' },
      ];
      svgHighlightEdges = pathToEdges(aiPath);
      render();

      await delay(150);
      playMoveSound('ai');
      await animateMove(aiPath, aiPieceText, aiPieceSide);

      // ---- Phase 5: apply AI result ----
      board = data.board;
      turn = data.turn;
      winner = data.winner;
      lastAiMove = data.ai_move;
      lastMoveRecords.ai = (data.move_records && data.move_records.ai) ? data.move_records.ai : fallbackMoveRecord(data.ai_move);
      overlays = [
        { row: aiFrom[0], col: aiFrom[1], cls: 'ai-from' },
        { row: aiTo[0], col: aiTo[1], cls: 'ai-to' },
      ];
      svgHighlightEdges = [];
      render();
      updatePanel();

      if (aiTargetHad) {
        const dstTd = document.querySelector(`#board td[data-row="${aiTo[0]}"][data-col="${aiTo[1]}"]`);
        if (dstTd) dstTd.classList.add('capture-effect');
      }

      await delay(500);
      overlays = [];
    } else {
      lastAiMove = data.ai_move;
      lastMoveRecords.ai = (data.move_records && data.move_records.ai) ? data.move_records.ai : fallbackMoveRecord(data.ai_move);
      overlays = [];
    }

    // ---- Phase 6: final state ----
    board = data.board;
    turn = data.turn;
    winner = data.winner;
    svgHighlightEdges = [];
    render();
    updatePanel();

  } finally {
    // ALWAYS release the lock, even if an error occurred
    animating = false;
    render();
    updatePanel();
  }
}
initOptionButtons();
renderBattleLog();
renderScoreboard();
</script>
